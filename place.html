<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mexico City - Place Page</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles/place.css">

  <!-- JavaScript -->
  <script src="scripts/place.js" defer></script>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Mexico City</h1>
  </header>

  <!-- HERO IMAGE -->
  <section class="hero">
    <picture>
      <source srcset="images/cdmx-large.webp" media="(min-width: 768px)">
      <img src="images/cdmx-small.webp" alt="Mexico City skyline">
    </picture>
  </section>

  <!-- MAIN CONTENT -->
  <main>
    <div class="info-container">

      <!-- DATA SECTION -->
      <section class="data">
        <h2>Data</h2>
        <p><strong>Country:</strong> Mexico</p>
        <p><strong>Capital:</strong> Mexico City</p>
        <p><strong>Population:</strong> 9.2 million+</p>
        <p><strong>Area:</strong> 1,495 km²</p>
        <p><strong>Language:</strong> Spanish</p>
        <p><strong>Currency:</strong> Mexican Peso</p>
      </section>

      <!-- WEATHER SECTION -->
      <section class="weather">
        <h2>Weather</h2>

        <!-- SVG icon (mobile view) -->
        <svg class="weather-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Weather icon" role="img">
  <circle cx="24" cy="24" r="10" fill="#FFD54F"></circle>
  <path d="M20 44h24a10 10 0 0 0 0-20 14 14 0 0 0-26-4A12 12 0 0 0 20 44z" fill="#90A4AE"></path>
</svg>
        <p><strong>Temperature:</strong> <span id="temperature">8</span> °C</p>
        <p><strong>Conditions:</strong> Cloudy</p>
        <p><strong>Wind:</strong> <span id="wind">12</span> km/h</p>
        <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
      </section>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; <span id="currentyear"></span> José Alfredo Bejarano | Mexico City</p>
    <p id="lastModified"></p>
  </footer>

</body>
</html>
